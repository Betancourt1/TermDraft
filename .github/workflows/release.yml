name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt,clippy
          rustup default 1.88.0
      - name: Validate tag, package, and executable
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", tag) is None:
              raise SystemExit(f"Release tag must be a stable vMAJOR.MINOR.PATCH tag, got {tag!r}")

          expected = tag.removeprefix("v")
          manifest = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          package = manifest["package"]
          binaries = [target["name"] for target in manifest.get("bin", [])]
          if package["name"] != "termdraft" or binaries != ["termdraft"]:
              raise SystemExit("Cargo package and executable must both be named 'termdraft'")
          if package["version"] != expected:
              raise SystemExit(
                  f"Tag {tag!r} expects Cargo version {expected!r}, got {package['version']!r}"
              )

          print(f"Validated {tag}: package and executable are termdraft {expected}")
          PY
      - name: Run quality gates
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets
          cargo test --locked --release

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add "${{ matrix.target }}"
      - name: Build release executable
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Smoke-test executable
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          binary="target/${{ matrix.target }}/release/termdraft"
          version="${RELEASE_TAG#v}"
          "$binary" --version | grep -F "termdraft $version"
          "$binary" --help
          "$binary" --commands
          "$binary" --inspect .
      - name: Package executable
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          archive="termdraft-${version}-${{ matrix.target }}"
          mkdir -p "dist/$archive"
          cp "target/${{ matrix.target }}/release/termdraft" "dist/$archive/"
          cp README.md LICENSE "dist/$archive/"
          tar -C dist -czf "dist/$archive.tar.gz" "$archive"
      - name: Upload release archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Generate checksums
        run: |
          cd dist
          sha256sum -- *.tar.gz > SHA256SUMS
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/SHA256SUMS \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "TermDraft $GITHUB_REF_NAME"
