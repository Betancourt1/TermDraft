name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Validate tag and package versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", tag) is None:
              raise SystemExit(f"Release tag must be a stable vMAJOR.MINOR.PATCH tag, got {tag!r}")

          expected = tag.removeprefix("v")
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = project["project"]["version"]

          sys.path.insert(0, str(Path("src").resolve()))
          import termwriter

          versions = {
              "pyproject.toml project.version": project_version,
              "termwriter.__version__": termwriter.__version__,
          }
          mismatches = {source: version for source, version in versions.items() if version != expected}
          if mismatches:
              details = ", ".join(f"{source}={version!r}" for source, version in mismatches.items())
              raise SystemExit(f"Tag {tag!r} expects version {expected!r}; {details}")

          print(f"Validated {tag}: project and package versions are {expected}")
          PY

      - name: Install release tooling and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" build twine

      - name: Run quality gates
        run: |
          ruff format --check .
          ruff check .
          mypy --strict src tests
          pytest

      - name: Build and verify distributions
        run: |
          python -m build
          python -m twine check --strict dist/*

      - name: Smoke-test wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/termwriter-release-smoke"
          "$RUNNER_TEMP/termwriter-release-smoke/bin/python" -m pip install dist/*.whl
          "$RUNNER_TEMP/termwriter-release-smoke/bin/termwriter" --version
          "$RUNNER_TEMP/termwriter-release-smoke/bin/python" -m termwriter --version
          "$RUNNER_TEMP/termwriter-release-smoke/bin/termwriter" --help
          "$RUNNER_TEMP/termwriter-release-smoke/bin/termwriter" --commands
          "$RUNNER_TEMP/termwriter-release-smoke/bin/termwriter-benchmark" --help
          "$RUNNER_TEMP/termwriter-release-smoke/bin/python" -m pip check

      - name: Generate checksums
        run: |
          cd dist
          sha256sum -- *.tar.gz *.whl > SHA256SUMS

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/*.whl \
            dist/SHA256SUMS \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "TermWriter $GITHUB_REF_NAME"
